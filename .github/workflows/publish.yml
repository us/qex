name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          TOML_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$TOML_VERSION" ]; then
            echo "Tag v$TAG does not match Cargo.toml version $TOML_VERSION"
            exit 1
          fi
          echo "Publishing v$TAG"

      - name: Run tests
        run: cargo test

      - name: Publish qex-core
        run: cargo publish -p qex-core --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish qex-mcp
        run: cargo publish -p qex-mcp --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
